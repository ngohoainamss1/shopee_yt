<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Gắn Mã Shopee Auto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #1a1a1a; color: white; display: flex; justify-content: center; padding-top: 20px; margin: 0; }
        .container { background: #262626; padding: 25px; border-radius: 12px; width: 100%; max-width: 450px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        
        /* Hiệu ứng uy tín */
        .live-stats { display: flex; justify-content: space-around; margin-bottom: 20px; font-size: 12px; color: #aaa; }
        .stat-item b { color: #2ecc71; }
        .pulse { height: 8px; width: 8px; background: #ff0000; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 8px #ff0000; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }

        .header-title { display: flex; align-items: center; justify-content: center; font-size: 26px; font-weight: 800; margin-bottom: 15px; color: #ff4d2d; }
        .header-title i { margin-right: 12px; font-size: 24px; }
        
        .btn-zalo { background: #0084ff; color: white; padding: 12px; border-radius: 8px; text-decoration: none; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-bottom: 20px; transition: 0.3s; font-size: 14px; }
        .btn-zalo:hover { background: #0066cc; }

        .input-label { text-align: left; font-size: 13px; font-weight: bold; margin-bottom: 8px; display: block; color: #888; }
        
        /* Input & Validation */
        .input-wrapper { position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 15px; border: 2px solid #444; border-radius: 8px; background: #141414; color: white; box-sizing: border-box; font-size: 15px; outline: none; transition: 0.3s; }
        input:focus { border-color: #ff4d2d; }
        input.invalid { border-color: #ff3333; animation: shake 0.3s; }
        
        .error-msg { color: #ff3333; font-size: 11px; text-align: left; margin-top: 5px; display: none; font-weight: bold; }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .btn-submit { background: #ff4d2d; color: white; width: 100%; padding: 15px; border: none; border-radius: 8px; font-weight: bold; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }
        .btn-submit:hover { background: #e03d1f; transform: translateY(-2px); }
        .btn-submit:disabled { background: #434343; cursor: not-allowed; transform: none; }

        .status-banner { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; font-weight: bold; font-size: 14px; align-items: center; gap: 10px; position: relative; overflow: hidden; }
        .status-waiting { background: #3d3419; color: #ffcc00; border: 1px solid #876800; text-align: left; }
        .status-success { background: #1b4332; color: #2ecc71; border: 1px solid #2ecc71; text-align: left; }

        .progress-bar { position: absolute; bottom: 0; left: 0; height: 3px; background: #ffcc00; width: 0%; transition: width 0.5s; }
        .status-success .progress-bar { background: #2ecc71; width: 100% !important; }

        .result-container { display: none; margin-top: 15px; animation: fadeIn 0.5s; }
        .result-row { background: #1e1e1e; padding: 15px; border-radius: 8px; border: 1px dashed #2ecc71; display: flex; flex-direction: column; gap: 10px; }
        .result-link { color: #2ecc71; font-weight: bold; font-size: 12px; word-break: break-all; text-align: left; background: #000; padding: 8px; border-radius: 4px; }
        .btn-open { background: #2ecc71; color: white; text-decoration: none; padding: 10px; border-radius: 6px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <div class="live-stats">
            <div class="stat-item"><span class="pulse"></span> Trực tuyến: <b id="online-count">51</b></div>
        </div>

        <div class="header-title"><i class="fab fa-youtube"></i> Mã YouTube Shopee</div>
        
        <a href="https://zalo.me/g/jxqjhu8b3yqjt1khtex6" target="_blank" class="btn-zalo">
            <i class="fab fa-whatsapp" style="margin-right: 8px; font-size: 18px;"></i> NHÓM ZALO HỖ TRỢ GẮN MÃ (FREE)
        </a>

        <span class="input-label">Dán Link sản phẩm cần lấy mã vào đây  (Bắt đầu bằng https://) 👇</span>
        <div class="input-wrapper">
            <input type="text" id="userLink" placeholder="https://s.shopee.vn/..." oninput="validateInput()">
            <div id="errorMsg" class="error-msg">⚠️ Vui lòng nhập đúng link Shopee (có https://)</div>
        </div>
        
        <button id="btnSubmit" class="btn-submit" onclick="handleProcess()">
            <i class="fas fa-magic"></i> BẮT ĐẦU GẮN MÃ
        </button>

        <div id="statusWaiting" class="status-banner status-waiting">
            <i class="fas fa-sync fa-spin"></i> 
            <span>Vui lòng đợi 5-10s... <br>Đang xử lý link... <br> Vị trí hàng đợi: <span id="queuePos" style="color:white">đang tính toán...</span></span>
            <div class="progress-bar" id="pBar"></div>
        </div>

        <div id="bannerSuccess" class="status-banner status-success">
            <i class="fas fa-check-circle"></i> ĐÃ GẮN THÀNH CÔNG!
            <div class="progress-bar"></div>
        </div>

        <div id="resultContainer" class="result-container">
            <div class="result-row">
                <div id="resultLink" class="result-link"></div>
                <a id="btnOpen" href="#" target="_blank" class="btn-open">MỞ LINK MUA HÀNG</a>
            </div>
        </div>
    </div>

    <script>
        // Fake số người online
        setInterval(() => {
            const online = document.getElementById('online-count');
            online.innerText = Math.floor(Math.random() * (65 - 45) + 45);
        }, 3000);

        function validateInput() {
            const input = document.getElementById('userLink');
            const error = document.getElementById('errorMsg');
            
            // Xóa trạng thái lỗi khi đang gõ
            input.classList.remove('invalid');
            error.style.display = 'none';

            if (input.value.length > 150) {
                input.value = input.value.substring(0, 150);
            }
        }

        async function handleProcess() {
            const input = document.getElementById('userLink');
            const link = input.value.trim();
            const btn = document.getElementById('btnSubmit');
            const error = document.getElementById('errorMsg');

            // Kiểm tra định dạng link: Phải có https:// và từ khóa shopee
            const shopeePattern = /^(https:\/\/)(.*)(shopee\.vn|s\.shopee\.vn)/;

            if (!shopeePattern.test(link)) {
                input.classList.add('invalid');
                error.style.display = 'block';
                return;
            }

            // UI Reset
            let fakeProgress = 0;
            document.getElementById('statusWaiting').style.display = "flex";
            document.getElementById('bannerSuccess').style.display = "none";
            document.getElementById('resultContainer').style.display = "none";
            btn.disabled = true;
            btn.innerHTML = "<i class='fas fa-cog fa-spin'></i> ĐANG XỬ LÝ...";

            // Thanh tiến trình giả cho "uy tín"
            const pBar = document.getElementById('pBar');
            const pInterval = setInterval(() => {
                fakeProgress += Math.random() * 15;
                if (fakeProgress >= 90) {
                    clearInterval(pInterval);
                    fakeProgress = 90;
                }
                pBar.style.width = fakeProgress + "%";
            }, 600);

            try {
                const response = await fetch('/get-link', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ userLink: link })
                });
                const data = await response.json();

                clearInterval(pInterval);

                if (data.link) {
                    pBar.style.width = "100%";
                    setTimeout(() => {
                        document.getElementById('statusWaiting').style.display = "none";
                        document.getElementById('bannerSuccess').style.display = "flex";
                        document.getElementById('resultContainer').style.display = "block";
                        document.getElementById('resultLink').innerText = data.link;
                        document.getElementById('btnOpen').href = data.link;
                        input.value = "";
                    }, 800);
                } else {
                    alert("Máy chủ bận: " + (data.message || "Thử lại sau ít phút"));
                    document.getElementById('statusWaiting').style.display = "none";
                }
            } catch (err) {
                clearInterval(pInterval);
                alert("Lỗi kết nối API!");
                document.getElementById('statusWaiting').style.display = "none";
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i class="fas fa-magic"></i> BẮT ĐẦU GẮN MÃ';
            }
        }
    </script>
</body>
</html>
